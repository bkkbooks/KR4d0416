body:
  text: 拙軒集卷四金王寂撰詞古漁父詞一聲欵乃破蒼烟萬頃滄浪蘸碧天黃篾筏頭間活計緑蓑衣底懶因緣酉年酒易多卯飲亥日魚收縱午眠坐笑磻溪太多事夢招西伯渭川畋昭君怨江行詞一曲清江環碧兩岸蕭蕭蘆荻烟雨暗西山有無間有酒須當痛飲百嵗黃粱一枕瞰莫放愁間上眉端㸃絳唇上太夫人夀阿母瑶池夢回風露青冥曉六宫儀表曹大家風好滿眼兒孫大國金花誥頭如葆未嘗聞道冷笑西河老同前閨思疏雨池塘一畨雨過香成陳海榴紅褪燕語低相問冰簟紗㡡玉骨凉生潤沉烟噴日長人困枕破斜紅暈菩薩蠻春閨回紋錦子殷勤織歸鴻㸃破晴空碧上盡最髙樓欄干曲曲愁黃昏猶竚立何處砧聲急强欲醉烏程醒時月滿庭同前鎮犀不動紅爐窄宿酲惱損金叉客瑞鴨靉雕盤白毫起鼻端韓郎雙鬢老箇裏知音少留取麝煤殘臨鸞學逺山同前回文題扇圖碧空寒露松枝滴滴枝松露寒空碧山逺抱溪灣灣溪抱逺山竹疏橫岸曲曲岸橫疏竹寒鷺宿平灘灘平宿鷺寒採桑子用司馬才叔韻西風吹破揚州夢歇雨收雲密約深論羅帶香囊取次分冷烟衰草長亭路銷黯離魂羞對芳樽剛道啼痕是酒痕同前馬蹄如水朝天去冷落朝雲心事休論蘸甲從他酒百分不須更聽陽關徹銷盡冰魂惆悵離樽衣上餘香臂上痕同前十年塵土湖州夢依舊相逢眼約心同空有靈犀一㸃通尋春自恨來何暮春事成空懊惱東風緑盡疏陰落盡紅減字木蘭花送春羽書催去落絮飛花縈不住湖上流鶯欲别頻啼三兩聲劉郎未到辜負東風何草草今度重來不放桃花取次開同前髻羅雙綰灔灔修眸秋水剪笑黶顰眉無限間愁總未知虛簷月轉一曲未終腸已斷百斛明珠買得樽前一醉無同前湖山明秀豆䓻梢頭春欲透學畫鴉兒多少間愁總未知新聲皓齒惱損蘇州狂刺史一斛驪珠許我樽前醉也無好事近贈妓玉帝掌書仙謫向世間初識一種可人情味肖江梅標格眉尖多樣惜關山無語淚偷拭别後錦城風月記河東詞客酒泉子夫人生朝褉飲連宵簾捲曉風香鴨噴兒孫羅拜捧金荷沸笙歌赤霜袍軟髻嵯峨名在仙班應不老人間嵗月儘飛梭奈君何人月圓再過真定贈蔡特夫錦標彩鷁追行樂管領鎮陽春而今重到鶯花應笑老眼黃塵憑君問舍雕丘側准擬乞間身北潭漲雨西樓橫月藜杖綸巾鷓鴣天秋後亭皋木葉稀霜前關塞雁南歸曉雲散去山腰瘦宿雨時來水面肥吾老矣久忘機沙鷗相對不驚飛柳溪父老應憐我荒却溪南舊釣磯同前千頃玻璃錦繡堆弄粧人對影徘徊香薰木麝芳姿瘦酒暈朝霞笑臉開嬌倚扇醉翻杯莫隨雲雨下陽臺平生老子風流慣消得冰魂入夢來南鄉子贈妓并引大定甲辰馳驛過通州賢守開東閣出樂府縹眇人作纍纍駐雲新聲明眸皓齒非妖歌嫚舞欺兒童者可比怪其服色與噲等伍或言占籍未久不得峻陟上游問之云青其姓小字梅兒因感其事擬其姓名戲作長短句以明日黃花蝶也愁歌之綽約玉為肌宫額嬌黃淺更宜京洛風塵無逺韻心期只有多情驛使知翠羽剪春衣林下風神固亦竒辛苦半生誰掛齒顰眉似怨東君著子遲醉落魄嘆世百年旋磨等間事莫教眉鎖功名畫餅相謾我冷暖人情都在這些箇璠璵不怕經三火蓮花未信淤泥涴而今笑看浮生破禪榻茶烟隨分與他過一剪梅蔡州作懸瓠城髙百尺樓荒烟村落疏雨汀洲天涯南去更無州坐看兒童蠻語吳謳過盡賓鴻過盡秋歸期杳香歸計悠悠欄干憑遍不勝愁汝水多情却解東流漁家傲夫人生朝前日河梁修褉罷間庭未拆秋千架萱草堂深飛夀斚香滿把綵衣蘭玉森如畫海上麻姑親命駕𤣥霜乞得宜春夏快約伯鸞冠早掛筠窗下團欒共說無生話同前瑞香巖秀不隨桃李伴國香未許幽蘭換小睡最宜醒鼻觀簷月轉紫雲娘擁青羅扇半世廬山清夢斷天涯邂逅春風面茗碗不來羞自薦空戀戀野芹炙背誰能獻踏莎行爆竹庭前樹桃門右香湯浴罷五更後髙燒銀燭瑞烟噴金獸萱堂次第了相為夀改嵗宜新應時納祐從今諸事願勝如舊人生强健喜一年入手休辭最後飲酴酥酒感皇恩謾興天地一浮萍人生如寄畫餅功名竟何益百年渾醉三萬六千而已過了一日也無一日韶顔暗改良辰易失絲竹杯盤但隨意酴醿賞罷更向牡丹叢裏戴花連夜飲花前睡同前贈妓寶髻綰雙螺蹙金羅抹紅袖珍珠臂鞲匝十三絃上小小剝葱銀甲陽關三疊遍花十八雁行歷歷鶯聲恰恰洗盡歌腔舊謳啞坐中狂客不覺琉璃杯滑纒頭莫惜與金叉插望月婆羅門懷古笑談樽爼坐中驚歎謫仙人烏絲落筆如神喚起小鬟風味學按古陽春對瓊枝璧月朝暮長新宦萍此身嘆别後迹俱陳獨有芳溫一念紅淚羅巾憑誰妙手為寫寄崔徽一幅真聊慰我老眼黃塵同前元夕小寒料峭一畨春意換年芳蛾兒雪柳風光開盡星橋鐵鎖平地瀉銀潢記當時行樂年少如狂宦遊異鄉對節物只堪傷冷落譙樓淡月燕寢餘香快呼伯雅要洗我窮愁九曲腸休更問勳業行藏驀山溪退食感懷山城塊坐空弔朋儕影撾鼓放衙休悄無人日長門靜折腰五㪷所得不償勞松暗老菊都荒誰為開三徑及瓜不代歸計渾無定羈客奈愁何儘消除詩魔酒聖兒童蠻語生怕閏黃楊爭左角夢南柯萬事從今省洞仙歌自為夀先生老矣飽閲人間世磨衲簪纓等游戲趁餘生强健好賦歸與收拾箇經卷藥爐活計辟寒金剪碎漉蟻浮香恰近重陽好天氣有荆叉舉案綵服兒嬉隨分地且貴人生適意也不願堆金數中書願嵗嵗今朝對花沉醉水調歌頭上南京留守聖世賢公子符節鎮名邦褰帷一見丰表無語已心降永日風流髙會佳夕文字清歡香霧濕蘭釭四坐皆豪逸一飲百空缸指呼間談笑裏鎮淮江平安千里烽燧卧聽報雲窗髙帝無憂西顧姬公纍接東征勳業世無雙行捧紫泥詔歸擁碧油幢同前木芙蓉并引戊申季秋月十有九日賞芙蓉於汝南佑德觀酒酣為賦明月幾時有蓋暮年遊宦之情不能已也岸柳飄疏翠籬菊減幽香蝶愁蜂懶無賴冷落過重陽應為百花開盡天公著意留與尤物殿秋光霽月炯疏影晨露浥紅粧奈無情風共雨送新霜嫁晚還驚衰早容易度年芳祗恐韶顔難駐擬倩丹青寫照誰喚劔南昌我亦傷流落老淚不成行紅袖扶酌酒風拂冰簷鎮犀動翠簾珠箔祕壺暖宫黃破萼寶薰間却玻瓈甕頭漉雪擘新橙秀色浮杯杓雙蛾小驪珠一串梁塵驚落俗事何時了便可束置之髙閣笑半紙功名何物被人拘縛青春等間背我趁良時莫惜追行樂玉山倒從教喚起紅袖扶著大江東去弔舍弟長堤千里過睢陽隱約江山如故憶昔斑衣為夀日伯仲塤箎歌舞博勝香囊笑爭瓜葛膝上王文度西城南浦月明扶醉歸路重來華髮蒼顔故人應怪我平生羇旅仲也風流今已矣俯仰人間今古閼伯層臺六王雙廟盡是經行處感時懷舊一襟清淚如雨同前美人破瓜年紀黛螺垂雙髻珍珠羅抹婭姹吳音嬌滴滴風裏啼鶯聲怯飛燕精神驚鴻標致初按梁州徹舞裙微褪汗香融透春雪少陵詞客多情當年曾爛賞湖州風月自恨尋春來已暮子滿芳枝空結湘珮輕拋韓香偷許空想凌波襪章臺楊柳可堪容易攀折同前芳姿蕙態笑人間脂粉尋常紅白大抵風流天也惜賦與梅魂蘭魄袁相名姝謝家尤物縹眇真仙格朝來酒惡可人一笑冰釋韓郎老矣情懷鬢絲禪榻花落茶烟濕心字殷勤通一線千劫消磨不得被底春溫樽前風味回首傷春客却愁雲散等間好夢難覔瑞鶴仙上髙節度夀轅門初射㦸看氣壓羣雄虹飛千尺青雲試長翮擁牙旗金甲掀髯橫策威行蠻貊令萬卒縱橫坐畫蕩淮夷獻凱歸來斗印命之方伯赫赫功名天壤歷事三朝許身忠赤寒陂湛碧容卿輩幾千百看皇家圖舊紫泥催去莫忘樽前老客願年年滿把黃花夀君大白
