body:
  text: 拙軒集卷一金王寂撰賦巖蔓聚竒賦伊合抱之巖藤迹其生之有漸挺標末其不凡商世用而尤贍裁撾馬之短箠綰維舟之長纜斫滇池飛電之杖組湘浦含風之簟獨髙節之擁腫外纍纍然中歉顧匠石之數過不側目而一覘有好事者非常風鑒破長橋之蛟卵剖巴山之猿嗛其混然而天成微斧鑿之可驗彼瓷石雖潔而近乎俗金玉雖珍而幾於僭當樽俎之勝處惟癭君之獨占惜流落於市井為時人之所厭幸淇泉之賞音輟酒直而見念不然則灰㸑下之桐而失酆城之劔老人既歸而謀諸婦曰我以酒隱處身純儉欣此物以有託了吾生而無憾於是撥春甕之嘈嘈漉乳泓之湛湛挹彼注兹十分瀲灔追顔子之瓢飲陋管氏之反坫咀嚼石蟹之霜螯狼藉荷盤之菱芡少焉既夕風清天淡舞月影兮徘徊吸露華兮泛灧已而先生徑醉也宫錦淋漓角巾欹墊捲河漢於一酌盡湖江於一蘸洗戰國之蠻觸弔古今之時暫陶陶乎釋身世之羈縛浩浩乎謝功名之機陷然後神遊八表兮其將以躡冥鴻之背而探驪龍之頷也五言古詩題寶泉軒野人強冠襟任事多脫略官府逃喧卑僧忩憩寂寞髙情渺層雲逸興發幽壑山色為誰來秋光無處著頽紅挂浮圖漲碧分略彴天共水相合風催雨欲作漁歌散汀洲舂相隔籬落屬玉破微茫斜書灑寥廓幽歡殊未闌歸興輒作惡後會定何時期以辛丁約詠張宫師二疏東歸圖戰國事縱橫廉隅初滅裂強嬴灰六籍名教浸衰歇卯金新典禮蠧簡訪遺缺人材就教育士檢敦修潔賢哉二大夫夢覺槐安穴功名我何有劔首吹一吷約日俱移疾乞身良勇決兩宫贐黃金恩遇顧不褻送車數百兩祖帳都門訣冥鴻謝繒繳天馬落羈紲倒囊促供具賓族相娛悅父子以夀終名聲日星揭人誰不學步卒莫踐其説寥寥閲魏晉得一陶靖節平生腰骨硬肯向督郵折後世無問津風流冷於鐵龍眠以畫隱遊意睎往哲嗚呼紙上影生氣猶凜冽宫師廊廟具天為蒼生設莫襲異姓封長揖稷與契云何眷短幅摸索墨漫滅况為山九仭一簣功可輟盍睎鳳巢閣姑置鷗歃血方將薦廟堂微公孰麴糵致君堯舜上鍾鼎載勳烈歸艇渺煙波晴樓醉松雪古今雖異時出處同一轍欵圖幸不惡蚤計政恐拙兩疏儻有靈抵掌冠纓絶題季札挂劔圖季札貴公子軒軒氣凌雲平生會心少四海一徐君相逢適所願情話如蘭薰徐君顧長劔意欲口不云季子心許之誓將歸獻芹駐節不容久驪駒促輕分言還訪舊隱路人指新墳干將挂髙木以示初意勤知已九泉下冥漠聞不聞今人交勢利輕薄徒紛紛豈惟此道絶反是為虛文伯夷微仲尼萬古埋清芬跋羣麞出谷圖我家崆洞南丁年習騎射每憶逐羣麞應手相枕藉一行吏風塵此事更何暇朝來閲短幅歸興輒命駕丹青知誰歟相與二易亞看猿良獨癡失林還可訝爾軀幸無罪爾肉鮮可炙毛臍竟自賊何異狨與麝水草苟自足慎勿害農稼恐逢曹景宗數肋不汝赦程尚書油煙墨書生短燈檠業苦孔之卓百巧出寒餓輕煤收紙幄魚胞杵萬計得此崑崙璞墜溝終不變良質信堅確摩挲等肘印肝腎要雕琢是中自有樂未許兒輩覺堂堂地官伯胸次吞河嶽隃糜優月給拜次豈不數人生幾量屐迅景驚飛雹胡為事細碎刻意追古朴得非遊戲耳一笑供掌握區區張與李小道安足學何當獻天子毛楮同甄擢增新漢文物潤色周禮樂天章貺詞臣宛彼雲漢倬但恐醉常侍狂登御床角和陳無己送東坡韻坡公守餘杭餞客傷乍逺人生貴知已旅退其可忍陳三天下士好德吾未見垂涎嗜熊掌擺手謝關鍵觀過斯知仁如月蝕輒滿聞風激庸懦所恨我生晚小兒難夫子辨并引豫奉朝命之夷門道過太行路左有二石像詬其父老云此小兒難夫子回車之故地豫惡其虛名而無實作是詩以辨之我行自并門道出太行嶺路傍古石人髣佛類形影過客互傳疑是非竟誰請會逢田舍翁荷杖雪垂領為問定何如愚蒙庶幾警云昔東家丘歷聘入吾境偶此值小兒難詰豪且穎丘也不能對驅車返天井邦人思其賢想像刻頑礦始豫駭其言嗔赤發面頸夫子聖者歟日月揭餘炳豈聞採樵斧巧掩運斤郢翁徒老于年此事能不省翁聞遽愀然色厲聲亦猛轍迹今尚存事况傳已永書生多大年詭辨勿復騁信知端木賜下釋東野獷正如與蟪蛄而語春秋景小姑嫁彭郎舉世莫能整嗟哉吾道窮生死何不幸生而非其時伐樹迹屢屏亦嘗撩虎鬚白刃脫俄頃死為萬世師廟貌多土梗自非二仲月門寮終嵗靜山魈與社鬼香火未嘗冷此事固不平此心嘗耿耿吾生賦拙直浪許近骨鯁與物例多忤所動坐愆眚憤世無奈何空令氣生癭七言古詩題張信道所藏李元素淮山清曉圖長淮宛轉淮山麓浩蕩淮光釀山緑側峯橫嶺巧連延直自鍾山徹浮玉曉來煙靄與風塵面目參差未是真中宵沆瀣一濯洗突兀了觀清淨身陽烏飛出扶桑路却拂羣陰披宿霧朝暉千丈卧長虹曙色半巖橫匹素須臾溪壑漸分明怪底懸崖化赤城風傳粥板僧定出露濕野巢鶴夢驚玄暉舊筆絶俗韻元素豪奪紫泥印祗今元素入窮泉惜哉一代風流盡題雪橋清曉圖山翁卧聽溪風急夜半篩珠落忩隙千巖浩蕩失故態萬徑荒寒滅人迹拏舟欲訪戴安道截岸層冰政堆積翩然清興不可遏側望招提無咫尺攝衣便挈蠻童去秃袖抱琴龜手漆長橋蠟屐拄枯藤卓破橫江玉龍脊粥魚晨磬聲未了扣門喚起彌天釋開軒對榻誰賓主呵手續絃坐搖膝從來支許事幽尋放意茶顛恣詩癖虎溪相送尚遲留更待林梢挂蒼璧題髙敬之所藏雲溪獨釣圖疏簾留客晝偏長茗碗告罷新爐香主人不恤寒具手為出牙籖古錦囊鵝溪半幅開平逺天際歸舟煙樹晚釣翁簑笠釣滄浪一波不動風絲軟吾家舊隱柳溪間誤落紅塵不放間披圖便覺清興發恍若坐我黃蘆灣黃陵翩翩貴公子愛畫乞詩差可喜幸今老父眼尚明莫惜千金訪繭紙題張運使夢景圖點鞭長算收餘暇忙裏偷間真倒蔗北忩鼻息落庭花一榻清風不論價平生雅志一丘壑小夢江山猶命駕雲低平野暗溪樹雨淋層峯補天罅老農市酒喚歸渡漁伯艤舟楓樹下開囊檢得春草句揮灑短軸爭膾炙夜涼吹笛當抗衡槐火石泉足更霸披圖撩我倦遊興念念蓴鱸乞長假與君田里馬牛風蠟屐藍輿趁蓮社畫工豈識夢中詩他日須煩息軒畫王子告竹溪清集圖溪山佳處多荒僻豹霧蛟涎斷人迹縱能陟險一登賞重繭百休疲峻陟豈知城市有林泉杖屨相從都咫尺尋常四友會真率茗具酒尊隨所適竹風細細几席靜花雨冥冥巾帽濕逸休方與聖賢對觀妙超然存目擊吹臺名士意領略手弄蒲葵坐搖膝吾宗盤礴拊長松似傷材大時難得漳川野老氣豪邁陪謁龍顔祗長揖琴書笑詠有真樂不減仙公戲巴橘九原死者如可作應恨烏絲欠珠璧蘭亭滕閣久寥落嵗月轉頭駒過隙願君此畫更珍藏此會他時恐難必跋韋偃病馬圖開元天寶誰能畫韓子規摹出曹霸惜乎畫肉不畫骨坐使驊騮減聲價晚生韋偃非畫工少也得名能古松試拈秃筆掃東絹便覺天廄無真龍胡不寫明皇照夜白弄驕顧影嘶長陌又不寫太宗拳毛騧百戰萬里輕風沙如何寫此神俊物剝落玄黃只皮骨却思落日蹴長楸風入四蹄追健鶻嗚呼往事今茫然矯首有意誰其傳主恩未報忍伏櫪志士扼腕悲殘年安得老髯通馬語芻秣醫治平聲平所苦行當起廢一長鳴要洗凡庸空萬古跋張舍人所收楊仲明天廄鐵驄圖大宛山下汗血駒麟鬐鳳臆龍頭顱黑花細灑雲滿軀倜儻不與駑駘俱黃金絡頭老京都注目落日思長途圉人仗箠不敢驅似聽馬語方踟蹰嗚呼龍媒已矣夫林鳥恨對長風呼誰能寫照開新圖楊子妙筆非臨摹願君著意收畫厨風雨變化防須臾乃翁丞轄翼帝車月旦人物評錙銖千金但賞駿骨枯世上良馬無時無題髙解元所藏武元直山水洞清宗元不傳法此老無乃得之心妙畫通靈恐仙去須防風雨夜堂深斯人地下骨應朽此畫世間寧復有莫與紛紛俗眼看等間却作丹青手覺花島并引豫聞覺花島蓋人間佳絶處也凡道經海上未嘗不駐鞍極望久不能去苐簡書有期不得一到為恨大定乙未之秋仲月十有四日豫自白霫審理寃獄歸投宿龍宫下院謀諸老宿期一往焉老宿曰今秋風徑波浪洶湧雖柁工篙師往來其間亦不免縮頸汗背當俟隆冬冰合如履平地然後可著鞭耳豫竟不聽明日登舟行未幾半風濤掀簸舟人為之變色於是收帆弭楫維石于北渡豫歎曰此而不濟則命也乃割牲釃酒投是詩以禱之遂復鼓枻以進已而風停浪靜天水湛然極目萬里恍然如坐大圓鏡中指顧之間已登彼岸舟僧詢大德者謂豫曰正直動山鬼詩句起蟄龍者信不誣矣豫笑曰如二公者千古仰之猶太山北斗豈庸人末士所可擬哉是必憐其勤而報以誠也不然則劉昆所謂反風滅火蝗不入境者皆偶然耳雖然此一段奇亦不可不紀也宫亭湖神感且通往來送客能分風廣德王祠禱輒應重樓翠阜浮霜空我行擬上覺花島香火遍走青蓮宫中流未濟成齟齬船頭西向旗腳東雲奔霧湧白浪捲一葉掀舞洪濤中平生行止類如此憑仗願有信與忠嘗聞主海尊位置顧豈變化難為功指呼蛟蜃掃陰翳天水萬里磨青銅解維轉柁飽帆腹雙槳不舉追驚鴻兹遊政要償素願勿使坐歎詩人窮投文再拜瀝微懇為我寄語白龍翁留題覺花島龍宫寺詩寺在遼東傳聞三山駕空虛珠宫貝闕神仙都茫茫弱水限舟楫人迹不到如有無平生點檢江山好祗有龍宫覺花島何年經創作者誰興聖帝師孤竹老老人絶俗棲金沙嵗久喜捨來天家懸崖架壑置佛屋突兀殿閣凌煙霞一作開明霞乃知造物開神異故壓祗園布金地四顧鯨波翼寶巖玻璃環擁青螺髻我生自厭薰羶腥坐覺兩腋生清泠夜涼海月耿不寐幾欲舉手捫天星明朝收帆落塵土一夢回頭散風雨向令坡老此經行想不願為天竺主拙軒拙軒少也絶交朋閉門坐斷藜床繩據梧手卷挑青燈目力自足誇秋鷹一行作吏負且乘簡書夜下催晨興心勞政拙無佳稱髙枕緩帶吾何曾年來安東逐斗升吻膠背汗疲炎蒸到官簿領交相仍臨事自笑無一能督責老掾詢聾丞曰畏罪罟空凌兢窮鄉九月河水冰玉樓凍合衣生稜氊裘火坑寒不勝呼吸未免髯珠凝積憂蓄熱邪上騰阿堵中有輕雲憑臨忩射日絶可憎決眥淚霣長沾膺初謂造物何侵陵細思無乃示小懲世醫膚見浪自矜肝膽豈易分淄澠屏除嗜欲學山僧此理蓋出三折肱斯文未喪信有徵天其使我雙明增要作楷字頭如蠅表乞骸骨歸丘陵負郭二頃産有恆堆盤苜蓿衣粗繒醉眠床下呼不譍自許此著髙陳登飯餘睡足搘枯藤老眼細數雲山層客中戲用龍溪借書韻太行西北雲橫目一日九回腸斷續舍官就養誠所願百口煎熬食不足逆行倒置坐迂闊相負此生惟此腹兹行逺去父母國戀戀不同桑下宿山長水逺苦愁人不覺秋風驚鬢緑平生拙宦失捷徑蘭蕙當門為誰馥文章既不一錢直五經安用忩前讀東塗西抹竟何有坐歎馬鞍消髀肉公家無補一毫髮鼠竊太倉叨寸祿既無里嫗誰乞火未有先容莫投玉天涯懷抱為誰開盡寫窮愁入詩軸柳城西聞蟬有感坡老放歸舟繫汴驚聽騾鐸鳴北岸文公嶺外得京官照蝎壁間猶喜見我今薄宦天一角適以平反叨使傳柳城西路忽聞蟬駐馬久之增感歎臨岐凄咽固有意似對鄉人論半面吾廬環木夏陰合聒耳長嘶吾每倦安東地冷無此物所以相逢眷還眷晚風晨露汝易足何苦叨叨聲不斷商胡遷客淚橫臆落日窮途方寸亂朱門砧杵快新涼乞汝秋天從呌喚轍中斃龜并引豫以公事按部郊行過汚泥濁水深不沒膝廣可三丈許車轍中有烏龜伏焉首尾餘尺豫初疑曝背舉而視之則頭且碎矣豫謂凡物之神無如龜者意其舍魚龍而伍蛙黽者則必厭網罟搜羅之患以求自安今復死于奔輪之下豈靈於人而不靈於已耶抑吉凶逆定而不可逃耶政如嵇叔夜鍛隱以避世反見譖於鍾會竟不免東市之刑信乎死生有命修短有期彼有不顧名節徼幸以求全者未必然也豫作是詩蓋有激而云玄夫六甲存神氣耳息綿綿口常閉會巢蓮葉緑毛叟遊戲人間閲千嵗吉凶未判倘謀及告以將來若符契江湖佳處多網罟側足恐為人所制搘床鑽灼事交病寧處不材從此逝嘉林居士強解事清江使者何經濟泥塗雖辱固不惡所幸此身能自衛豈期曝背當車轍碎首奔輪翻致斃乃知生死有定數萬物皆然無巨細夔蚿多寡各安分椿菌短長均一世越人善療卒兵死單豹養生遭虎噬爾今韜晦竟不免使我追傷收寒涕至人知命付一笑我輩情鍾能不蔽千古蒙莊倘有靈須知曳尾非長計豫以朝命催租河朔道出隆慮邂逅楊東卿蓋棲霞隱人也嘗許豫小山以地逺卒不能致約以後期故作是詩以為定劵嗟君學得屠龍手走遍人間病糊口左携妻子右琴書却返棲霞老耕耦閉門間草太玄經冷眼兒曹事奔走惠然過我便傾蓋夜對寒燈共樽酒掀髯揮麈話平生河漢無聲轉星斗自言家蓄小玲瓏坐使鐫鎪耻牛後書生嗜好固多誕不許千金酬弊帚山深但恨卒未致他日願為吾子夀人生尤物安用多要與仇池為二友明年尺牘遣長鬚莫為先生化烏有上周仲山少尹夀姬公勳業千古髙雲孫間出皆時髦篤生夫子賢且豪風義凛凛魁吾曹詞源萬斛何滔滔作賦竟欲續離騷懸知富貴不可逃鄉人莫敢輕韓翺長竿不肯驚鯈濠引手一釣三山鼇命也數奇時不遭屈為郡縣真徒勞不容吏手如桔槔乾沒遽止民無搔近出幕府持旌旄季孟伯厚胡為叨朱門琉璃載蒸羔先生盤飯獨溪芼衆人醉死貪濁醪先生嗽石羞醨糟仕者往往爭錐刀既角而齒寧非叨黃金堆丘爛巾袍公獨視之如秋毫乃知賢愚異所操相去豈特九牛毛久諳世味嚼空螯徑欲脫幘誅蓬蒿吾君側席登夔皋如君才氣寧容韜蒼生渴望方嗷嗷要使萬類歸甄陶禮樂具舉弓矢櫜樂職頌德追王褒乞身歸老隻魚舠煙波萬頃翻葡萄蠧書卧看橫長篙衝煙破月時嬉遨會逢石髓流青膏嗅如香粳食如桃方瞳瞭然牙齒牢人間嵗月從奔濤久厭濁世薰腥臊振臂一舉辭盧敖黃鵠飛去壤蟲號髣佛碧落聞雲璈漕副劉師韓自遼西按田訟回僕率僚友迎勞於郊是夕僕酒戰敗績明日師韓傳檄再三竟不復出蓋渠豪於飲而僕素不能也戲以此詩解嘲劉侯士論推豪邁雲夢胸吞無蒂芥興來和月卷玻璃纍舉十觴嫌未快我生不飲亦勉強涓滴濡唇亦狂怪螳蜋怒臂要當轍大白相浮爭勝敗初期堅壁老強敵督郵自困平原界鼓噪其如氣已竭偃旗棄甲投戎械黎明檄戰示巾幗曾未致師先瓦解君於伯倫當季孟我辱無功謾宗派服而舍之古善政驟勝且驕兵所戒濟水焚舟會有時勿卑邾小撩蜂蠆題劉器之秀野亭劉郎事業凌徐嚴風骨玉立髙巉巉平生雅志在丘壑嗜好與世殊酸醎謀身易足田百畝一作時人但笑家四壁活計祗有書千函一作愜眼嵗計書千函短衣絶勝杜陵老窮冬性命依長鑱南城佳處有别業手種杞菊植松杉十年小築直倒蔗佳木異果陰相攙一作來禽青李陰相攙漉醅自有赤腳婢安用捧碗柔摻摻清談到聖會心處目送飛鴻唯阿咸鳬仙榜名以秀野老子於此端不凡開軒如對龍眠畫恍然坐我勝金巖期君少起賦雲夢聽卜區區陋畢諴一作期君獻起長楊賦後來未必數畢諴曲江燈月足行樂歸路草色迷春衫却愁三徑花狼藉燕覓舊主聲呢喃功成事了當勇退北山勿遣移長緘我今出試已大謬畫餅聊慰癡兒饞茂林豐草麋鹿性絡腦不受黃金銜還家未有置錐地但免薏苡明珠讒頭顱過此可知矣嵗月飄忽追風帆他年定約卜鄰舍屋茅為我先誅芟吾言要踐不可食江水在此神其監送人官滿二首朔風吹雲雁程起木葉蕭蕭落寒雨先生官滿遊京華扁舟欲發湘江渚寫詩餞别各盡觴遙瞻蓬島三千里思君到日梅亂開瑞雪花飛鳳城裏草堂新成長獨吟故人不來黃葉深茶煙晝消倦掃榻梅月夜冷慵調琴我歌驪駒餞君酒君出陽關傷我心長江東去浮畫鷁悵望雲樹懷知音用時元瑜韻廣平平昔心如鐵句法澄江湛秋月地爐無火聳山肩坐對梅花咀冰雪是中何好有底憐其樂自謂超三禪想君曩嵗客淮上凍腳遍歷溪橋邊見花輒飲醉即歸龍蛇揮掃爭新竒至今清夢時到舊遊處尚記幅巾直掇橫笻枝錦囊投我須鄙句正似西子枉駕招東施梅兮梅兮爾今但有一夔足世人未識本來之面目寄謝無為老衲他日但過時當為浮香主人留一宿送劉彥美吾黨之子來何獨妙年器宇非庸俗初聞吾族盡窮窘次以平安報修竹挑燈把酒操南音似喜人聲到空谷翻然語别得無情天涯况是平生熟題左閣使瓊花后土像維揚瓊花天下無木犀避舍梅前驅梁園移植有深意要識姑射冰肌膚絶品豈知神所寓等間未許京塵汚空煩腰鼓揭春雷打徹涼州殊不顧明年詔遣歸故宫玉蘂爛漫縈天風香聞二十四橋外熱惱坐變清涼中世間無物那容久一夢兵煙化烏有無雙亭上月依然可憐空照傳杯手何人收取斤斧餘栗玉其色差溫如三都賦客眼青白歎惜流落潛欷歔十襲珍藏咨國匠寸龕為刻柔示音祗像禕翟煌煌玉座間想見嶽瀆來稽顙嵗時香火必躬親靈爽舍此依何人酒胡賤役何足道居士強名安得神物理細思寧有間犧樽毋忽溝中斷不如塗樗社櫟兩不材得盡天年保無患謝王仲章惠淮馬憶昔短衣精騎射千金市馬寧論價尋春不惜錦障泥歸醉且無官長罵一行作吏遭羈束五斗紅陳家不足驊騮賣却買駑駘夜齕空槽敢食粟年來可笑窮到骨奔走不暇黔吾突天公更使我馬殂造物戲人無乃忽聞君廄有江淮種風入四蹄兩耳聳惠然見貺頗周急幸免塵靴行決踵投詩寄謝三嘆息羞澀倒囊無寸積他年客路會相逢小倩夢蘭吾不惜題劉德文樂軒君不見達官火色凌朝霞傳呼數里清堤沙門人故吏聽頤指吹噓一到枯生花那知任重責亦重朝服坐待曉鼓撾攖鱗逆耳事可畏四十未過兩鬢華又不見朱門錢癡豪且奢氍毹按舞催筝琶萍虀豆粥何足道猩唇熊掌來咄嗟那知中夜獨不寐百萬計恐毫釐差匹夫無罪死懷璧何異犀象之角牙人生快意在富貴富貴尚爾餘何誇劉君適意殆非此其樂自謂真無涯官間事少憂患少君恩飽暖及全家夀親餘瀝沾賓友教子尚有書五車百年萬事付杯酒部伍鼓吹鳴池蛙眼前識破兩蠻觸胸次不置千褒斜箇中歡趣例如此回首富貴誰能加我今百指無定止負舍却羡循墻蝸思君清樂不可得對此况味殊不佳何時徑往君家去主孟莫厭煎鹽茶題中隱軒君不見嚴君平梅子真成都卜肆吳市門萬人如海一身隱外聽車馬爭馳奔又不見介之推屈大夫綿山澤畔何區區孤髙與世自冰炭甘焚就溺捐微軀兩公朝市大喧噪二子山林更牢落混俗變姓良自欺賣身買名何太錯我則願師白樂天終身衮衮留司官伏臘粗給憂患少妻孥飽暖身心安况有民社可行道隨分歌酒陶餘歡經邦論道不我責除書破賊非吾干折腰束帶莫恥五斗粟猶勝元載胡椒八百斛一朝事敗竟赤族嗟爾安得為孤犢塵靴汗板莫厭時奔走猶勝李斯相秦印如斗一朝禍起遭鞭杻却思上蔡牽黃狗况知富貴不可求僥求縱得終身憂不如中隱軒中日日醉倒不省萬事休
