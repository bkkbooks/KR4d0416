body:
  text: 拙軒集卷三金王寂撰七言律詩萬春節口號翠輿黃繖望天顔警蹕西清綴兩班瑞日曈曈明綵仗香雲靄靄擁蓬山已聞賀使朝金闕佇見降王欵玉關君夀國安從此始老人星現丙丁間送田元長接伴髙麗告奏使聖朝萬里息烽煙冀馬吳牛盡穩眠蝸國弄兵貪裂地蟻臣將命懇呼天政須老手不生事故遣吾髯更著鞭想到鴨江文字飲德星清對兩詩仙還鄉亂後人烟到處稀馬尋歸路駃如飛誰憐膝上狂文度却作遼東老令威閭里舊遊渾似夢交親相對漫疑非形容變盡君休問大勝遊魂不得歸題藺相如廟應憐趙弱不能國天贊此老禆時君按劔不屈秦天子廽車豈畏亷將軍區區太子徒見慕奄奄諸輩復何云名重泰山成底事一科蓬底覔孤墳中秋待月聳肩危坐覺寒侵雲罅玲瓏看湧金所恨輕違經嵗久莫辭姑待到更深據床老子非無興造物小兒真有心憑仗何人訟風伯為儂西北捲層隂登郡城有感禹别九州此其一下臨淮汝上虛危掛壺樹老孫枝長懸瓠城荒女口卑敗址頽垣馴虎廟冷煙寒雨化龍陂客懷感慨知多少倚徹欄干欲下時渡遼舟中小酌佳㑹清歡取次成逸羣髙論極崢嶸掀髯已判玉山倒蘸甲不辭金碗傾落日襯雲魚尾赤斜風捲水縠紋生預愁江上分飛後千里關河月共明留題晉陽古城慧明寺勞生來往竟如梭蕭寺重逰感慨多十里晉溪新景物千年唐叔舊山河苾芻香滿阿蘭若舍利深藏窣堵波我欲壁間書嵗月奈何慚愧小東坡璧間有蘇叔黨留題故云題劉德文樂軒書生活計一囊錢以樂名軒豈漫然得意山間聊寓酒賞音琴上本無絃園空洛社今誰獨堂在雎陽底事全㑹見慈親封大國金華榮拜雪垂肩送張希召見說東人若倒懸正須老子與安然預知和氣千門溢想見先聲萬口傳坐使遊民羞佩劍斷無姦吏浪催錢笑談了却公家事莫惜新詩寄百篇上咸平帥耶律夀勳業凌煙鬢未華門森霜㦸擁髙牙漢朝劔履元臣後遼國貂蟬太后家黃閣已聞虛鼎席朱衣行引上堤沙吹簫况是神仙侣知看蟠桃幾度花詠虱鬅鬙鶴髮坐搔頭破碎鶉衣不奈秋緩帶笑儂時詭遇處禈嗟爾亦良謀褁章想倦嵇中散披褐幸容秦武侯猶勝元封缺定逺枕戈無暇解兜鍪題香山寺平生居士愛香山百嵗神逰定此間黃卷既能探妙理青衫安用拭餘澘櫻桃笑日艷樊素楊柳舞風嬌小蠻尚想夜深携滿老幅巾來聽水潺潺上大人通奉夀三首舉世鷗盟多反覆我翁強健果投簮三薰三沐蕩塵慮一詠一觴償宿心柱下相君能漱石頴濵遺老悟休隂天公報夀豈無意要識三槐種德深月旦人材口不談市朝氷炭飽經諳平生拙宦魚千里投老退休僧一庵細數行年今九九了知得髓後三三聖朝文物方求備㑹補遺書訪濟南每年禊飲飲須醉盡日送窮窮奈何子姪藍輿隨靖節天人方丈問維摩歸心寸草夢危枕爭道楸枰驚爛柯願與羅浮竹尊者時看銅狄笑摩挲時元瑜以笻杖為吾親夀國士憑誰致此君羅浮知見幾雲孫生成鶴膝挺髙節斷去龍鬚露老根應與蒲萄隨漢使羞同澀勒暗蠻村我翁兩腳猶強健要看蓮峯玉女盆郭惠叔雙封堂淵源忠孝出汾陽天子嘉之畀寵光素髮迎將兩翁媪彩衣羅拜幾郎娘傳看瑞草文犀軸笑捧金花古錦囊我亦同君與榮幸追懷風樹涕淋浪上韓運使夀用上蕭帥詩韻建節十年鬢未華印懸如斗擁髙牙晚生幸識荆州面異世猶尊吏部家向昔神仙得石髓至今鉛鼎養丹砂人間遊戲知多少眼有方瞳頂聚花哭二舍弟才猷事業未一試歎恨若人沉九原折簡見呼徴汝夢賦詩成䜟兆豫言二千客路未歸櫬八十老親猶倚門誰為臨風歌九辨睢陽髙處與招魂二舍弟頃年嘗夢冥府追去豫比未聞喪跋織錦文禽圖云却憶鶺鴒風雨後水寒沙冷可憐生時人以為䜟故併記之哭田去華此老初無適俗韻請歸田里傲南窗平時誰送楊臨賀死日共知張曲江人果贖兮身可百士能如此國無雙佳城一閉風流盡尚想修文對漆缸哭僧義和二首瘦權平昔事風騷痛矣吟魂不可招廟裏香爐從此去杖頭明月更誰挑雲披山頂浮螺髻風鼓松聲振海潮他日東坡作真供石泉槐火憶參寥竹杖芒鞋上翠微山川良是昔人非無心野鶴穿雲去洗鉢山童帶月歸此二句蓋二舍弟夢中所得已而義和告逝豫特以此終篇耳醉墨舊書雲老壁勝逰常扣贊公扉老人手種堂前柏不見蒼皮四十圍送張仲謀使三韓照海旌幢出樂浪過家上冡路生光鴨江桃葉朝迎渡岊嶺松花夜煮湯恩詔肅將芝檢重醉鞭低裊玉鞘長遺民笑指天車道酷似南陽異姓王髙麗稱中原使節皆曰天車某官事見閻子秀鴨江行記黃桃花應嗔國色朝酣酒賜與羽衣如太真道士厭看千樹老令君别換一城新緗梅拂額更不俗栗玉削肌殊可人想得乞漿尋舊約東風不似去年春奉題少保張公曲阿别墅二首休沐時時散馬蹄緑隂如染轉長堤帝城和氣融春圃相國餘波到兩溪無數龜魚欣作主不言桃李自成蹊聖時正要傳衣事賀監從渠老㑹稽鍾湖亭下水淙淙緑野平泉未易雙十里藕花紅步障一軒松䕃碧油幢洛中獨樂有司馬天下不名知曲江紙尾欲煩賢宅相雨蓑添我坐篷忩上咸平帥耶律夀九重前席喜忠純不待先容自致身漆水襲封無冷眼德光傳世有名臣早登祕閣直清禁旋陟樞機歷要津蒲坂餘波千里潤栁城和氣萬家春定須鈇鉞專方面未許江湖拜散人鶴骨固應多夀考㑹看滄海起飛塵五言絶句題懿州寶巖寺壁雨竹寧為強項侯不作折腰吏羞對桃李顔傷春泣紅淚題武公實扇春瓮篘新蟻秋盆鱠錦鱗髙眠無一事爭羡市朝人六言絶句題扇荷柄猶擎宿露荻花已著秋霜寄語浣沙逰女莫驚溪上鴛鴦七言絶句題船子和尚圖二首雨笠烟簑三十年一篙投意便忘船何如更擬吳江上付與兒孫慶有緣夜靜風髙江水寒歸船空載月團圓須知釣得金鱗後只是當時舊釣竿納凉蕭寺午晝葵花潑眼明緑隂深處轆轤聲燕泥吹落欺人睡無賴薰風也世情和張運使送春六首别院重門幾許深桃花結子柳成隂也知春在荼䕷架自是愁多懶重尋蛛網氷徽不復開等間魂夢可曾來鳥啼花落傷心事惆悵東風喚不回黃昏簾幕為誰開嫌怕雙飛燕子來腸斷一春無好句令人慚愧賀方回貼水新荷卷未開隔墻風送落花來兔葵燕麥應相笑前度劉郎去又回老却芳菲過却春流鶯應怪舊逰人犀圍不管年年瘦璧月無端夜夜新樹底殘花積漸深樹頭新緑不多隂留春春去無料理試倩行雲夢裏尋沙丘白璧沉江夜鬼呼明年當是祖龍殂海中童子無消息坐待長生豈不迂微子廟比干忠諫死如歸箕子佯狂脫禍機君厭殷辛髙謝去三仁誰是定誰非和黃山谷讀楊妃外傳五首兄弟漸疏花萼夢君王貪醉上陽春却將妃子比飛燕何物謫仙能屈人姚宋云亡言路塞虢秦徼寵禍機深平時笑指祿山腹信道是中惟赤心金步搖低雲髻墮瑞龍香散野風吹嶺南驛傳來何暮趂得新墳薦荔枝環子竟逢山下鬼老翁空歎木牽絲年年牛女相逢夕記得憑肩私語時飛鴈秋風汾水上淋鈴夜雨蜀山前此時一念無料理阿瞞何由雙鬢𤣥艾人野艾乘時加束縛奮髯嚼齒似能神偶然擡舉在髙處白眼難堪不視人宿錦州廣濟寺僧房卧屛一幅畫一綸巾羽服隱几胡床命短童汲水澆花若有所待者相望一翁桶帽凉衫倚杖於溪橋之上意其眷戀風景而緩其行也乃賦二詩垂栁隂隂晝日長野人無事自清凉秪應冷笑黃塵裏為米癡兒有底忙溪橋泉石想佳哉欲去遲遲首重回不道西莊閒處士胡床虛左待君來萬春節宴罷述懷去嵗宫花插滿頭玉階端笏覲珠旒如今淪落江淮上始覺衰殘兩鬢秋題張子正運使所藏楊德懋山居老間圖仍次元韻四首山崦人家落照間笑携兒輩語柴關應憐烏帽紅塵客有底功名不肯間竹屋松窗水石間野人門户不曾關官租了却迎神罷社酒雞豚日日間世路風波俯仰間趦趄行恐墮機關豈知野鹿便豐草金絡從渠十二間張侯詩敏落黃間楊文規摹逼老關二妙通靈恐仙去夜忩風雨要防間附寄陳州陳顯祖若到睢陽話汝陽故人應也問行藏但言甚矣吾衰矣三友軒中作退堂渡遼我家河朔望咸平飛鳥猶須半月程盡道遼陽天樣逺渡遼何况更東行朝歌城獨夫亡國固宜哉不省雞聲是禍胎辛苦朝歌城下土暫成宫殿却成灰銅雀臺銅雀臺荒桑柘圍老瞞曾醉柘黃衣錫花片瓦將安用留與詩人寫是非跋楊損之所藏楊德懋秋江捕魚圖二首雨簑煙笠老江湖回首人間萬事疏不向市橋魚換酒似聞官路有徴車楊文歸心寄老毫楊侯真賞衒詩曹都緣家世有漁隱曾著蓑衣傲錦袍元日偶題三十年前老錦工投梭端有運斤風重來莫訝無人問花樣如今盡不同月下聞蟬赤日黃塵沒馬鞍宵征聊快月波寒飲風吸露易為足何事區區口不乾望仙樓麗華朝夕侍宸逰秋月春風醉不休擒虎兵來狎客散歌聲猶在望仙樓慶州北山之麓遼山陵在焉俗謂之三殿二十年前常為盜發所得不資是所謂厚葬以致寇者嘆而成詩珠𥜗適足賈身禍金碗傳聞落世間慚愧漢文遺治命瓦棺深葬霸陵山題煙寺晚歸圖上方直去天一握歸路轉回山半腰老衲遲遲緣底事要乘佳月過溪橋細腰宫玉立宫娃滴滴嬌君王沉湎醉春宵不知天下歸長距猶向尊前舞細腰白馬寺竺法初從西土來黃冠犄角力相排當時道教灰飛盡貝葉真經安在哉宗州帥守㕔事東偏有燕寢之所壁畫四皓戲以一詩嘲之偃蹇商山四秃翁龍飛蛇斷笑談中出為羽翼成何事輸與留侯萬世功朝服迎詔馬上偶成走遍人間為口忙人間無路不羊腸東風叵耐相欺得吹盡朝衣兩袖香兒子以詩酒送文伯起既而復繼三詩豫喜其用韻頗工為和五首山肩吾子類賈島火色我儂輸馬周但得把螯同一醉絶勝側目避監州逢人不肯下顔色砥柱屹然羞比周能詩怪有墨君僻一派元出文湖州樽酒但能供北海漁簑安用釣西周七言五字得誰髓老杜工部韋蘇州轍底波臣渴欲死政煩斗酒亟呼周錦囊詩草勿浪出嫌怕聲名動九州畫餅虛名戰蠻觸黃糧春夢閲商周吾衰久矣百念冷不用三刀兆益州伯起善用強韻往復愈工再和五首解醒五斗多安用通道三杯急可周放下藍輿成一醉眼髙不顧王江州耽詩竊比城南杜寄傲真同柱下周花底最宜文字飲不須羯鼓打梁州曹植波瀾元自大嵇康禮法若為周試携詩律摧堅敵絶似乃翁平貝州善交人者久而敬其責已也重以周莫笑山中醉朝暮舉鞭猶解問并州鄉關煙水三千里客舍星霜一再周臣子愛君無逺近斗牛箕野望神州浴桃花湯惜爾不遭淮海賦幸然得免驪山汙如何不肯混常流要使衆生清淨故沁水山寺兩峽山髙月半輪五更人起馬嘶頻無端又上長安道輸與僧忩飽睡人逸句生涯貧到骨家具少於車留别郭熙民五年風雪黃州閏萬里關河渭水秋盧植墓南臺故址今頺然漢盧植墓疑相傳
