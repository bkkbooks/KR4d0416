body:
  text: 拙軒集卷五金王寂撰表謝帶笏表言綸迅召已驚不次之恩手板俄頒更辱非常之賜式祗承於帝眷果悚動於朝班中謝伏念臣去國五年挈家萬里自謂永捐於溝壑豈期再造於闕庭重惜殘年特加異數清談廢事肯將拄漫吏之頥老氣未除猶足擊姦賊之齒兹蓋伏遇皇帝陛下德以增新人惟求舊世宗饗國臣常叨與於諫員顯考上仙臣亦經營於葬事慚無服稱猥荷恩私臣敢不正以垂紳書而對命奉公竭力爰用贊於君前抗疏乞骸即願還於陛下夢賜帶笏上表稱謝覺而思之得其五六因補其遺忘云為貧而仕素慚四壁之空得寵若驚猥被萬錢之賜拊躬知愧感涕何言伏念臣捕驪得鱗畫蛇成足嗟當途之見嫉投絶徼以可憐蓋為容無蟠木之先甘後來居積薪之上豈其衰朽有此遭逢丹赤捫心無負孝先之經腹重黃奪目不堪沈約之詩腰兹蓋伏遇皇帝陛下力援孤蹤甄收舊物念羣言交搆擠臣於不測之淵惟獨斷至公起臣於久廢之地哀其老態奬以異恩臣敢不佩魚自警以不眠解貂無從於彛飲垂紳畫䇿贊股肱庶事之康搢笏稱觴報岡陵萬年之福牒僧尼度牒右伏以聖時遭際梵教𢎞揚方治具之畢張宜法輪之常轉以爾拈花授記剗草逢師既得度以比丘身當求證於菩提果護持戒體精進道心往慿香火之因緣增祝君王之夀算道士女冠度牒範圍至道衣被含生太和薰靈寶慧香多暇適希夷真境以爾脫離世罔攀慕仙梯諷蘂笈之玄文佩金壇之祕籙損之又損優遊踐黃老之言純乎其純清淨贊唐虞之治記寶塔山龜鏡寺記直遵化之南餘一舍有山壁立而秀者蓮峯也求之圖志不知其所本里俗舊云以其諸峯環列狀若浮蓮或謂山有蓮池而因以名焉遼大安八年祐國寺僧傳戒上人普鑒厥初往來山間駐錫泉上得遺址宛然意其可作道場即巖穴而屋之粳核襏襫奉持頭陀行甚苦嵗餘逺近緇素從者如歸師知願力可成乃作意以新之已而輸財獻力相望於路者惟恐其後如此且閲數年荆棘蒿萊化成金碧初謂之蓮華院先是山巔時見大窣堵波觀者無不震駭又嵗適大旱父老相率禱雨於池上輒應報謝之夕池有神龜負大金鏡而出移刻不沒俯而窺之隱莫得見寶塔龜鏡之名蓋始於此矣天會間寺嘗為劇盜所據火其居逐其人蕪廢殆盡演祕大德義秉及其徒澄輝始終相繼增完如故昔吾先君與輝為方外交輝求文為記固不可以不書豫非喜志怪者靈蹤祕迹皆質於傳戒之塔銘與義熙之石刻然石刻所載脫略多不可取以豫考之義熙蓋東晉安帝時也距今垂千載風蝕雨蠧石當斷裂無幾方是時此地亦非晉有不知從何而致此耶寺僧上首道臻云老宿相承寺基之日是碑與石羅漢像三皆發地而得之豈非聖賢豫設神物護持出有其時若合符契顧未持一蔽之論而為亡是哉豫應之曰果如子言則吉州發蒙之銀罌武昌寒溪之金像是皆出耳目之外非世智可量其然乎其不然乎吾不得而知也寺去廣逺途三里而近遊人供客且無攀緣杖履之勞至於登臨顧揖則晨霏夕靄暖翠晴嵐盡東南之勝於俯仰之間實古今佳處所謂蓮池者恨不復見詢及耆舊得痺僧興悟者年幾八十自言兒童時注瓶滌鉢每於是焉其泉出西巖兩石股間蓄之為池縱橫廣三丈甘泠清徹飲衆五百日用足而不加少其後不知其為誰實而基之築屋其上少南數步今猶有遺井存焉深不及丈審知其源不逺耳夫物之成敗相尋固自有數雖然未有不因人而廢興者也噫池廢之久矣安知他日無長材好事者撤屋廢基浚而出之使復舊觀是人必能懸折腳木床待我於西池之上酌泉瀹茗共話無生吾雖老矣尚堪作後記云大定十八年嵗次戊戌春正十有八日起復朝請大夫真定少尹兼河北西路兵馬副都總管王某記祁縣重修延祥觀記唐栁州有言曰賢者之興愚者之廢廢而復之為是習而循之為非此古今之通論然而賢者之興未有不因時而成者也延祥觀介祁之西郭故基蓋里豪之私第也宣政間其家有瞰其室者託形聲而下殃禍焉師巫更召殫術罔功嵗久疾病死亡惟家之索其後轉易數姓亦莫得安以故曠而弗居者有年數矣初里中賢士大夫及其耆舊相與謀曰吾鄉祁奚故邑世有名人如漢隱士王烈魏忠臣王陵晉溫恭之六龍唐溫嵩之髙節其遺風餘烈凛然如在也故吾俗近古以來務本樂善以尚施凡神祠佛剎康莊相望若奕碁然獨老氏不壇不宇無乃大闕歟我輩豈不能新以數畝之宫付有道者主之嵗時建立道場為民禳禬俾一方隂受其賜豈小補也哉聽者皆曰可即以胥其姓福其名者總尸其事卜日募民錢以市西郭之廢宅議者或謂有物所憑不可以擾胥應之曰諸君止知其一又焉知天將以此為福地前以神物護持耳於是疑論氷釋識者韙之初作中殿凡五楹八架銖積寸纍數嵗而後僅成自餘枝傾補罅力所不贍而已豈所謂行百里者半九十里乎會銅鞮道士傅道一與其輩二三以術遊其邑咸謂傅之才謀足以興辦繇是挽留惜乎願與時違後來共事者枘鑿有不合竟以無功去矣自是益難其人蕪廢久之後數嵗得清虛大師程履道者其為人渾厚德望隱然并汾千里間推以為宗門主盟者其始至則齋厨屢空從者不堪其憂師淡然自若也未幾或有以改作之説告者師曰未遑也吾今父糊其鄰子丐於市中外道俗薰知見香者無幾雖欲速成其可得耶告者謝以不敏居數月晨夕鐘磬殷殷谹谹無何術相氷炭者種種訾詆又未嘗聞道者或羣聚而大笑之門弟子合辭而進曰彼無根之毁鼓倡流俗自非髙明特達疑信相半矣師其聞而知之歟是不可不與之辨答曰蟪蛄不知春秋醯雞斷無天地顧彼何足以語道哉但當壁立千仭不與之校終必沮而已矣既而信然越明年風教大振景仰傾數州至於聽衆供客相望於道路惟恐其後嚮之訾詆聚笑者往往投身謝過師亦歡如平生一不之責間而師謂其徒曰吾志可行矣翌日大集四衆而諭之曰今庳屋數椽瓦敗木朽每大風雨疑將壓焉久欲易以新完未知其可也於時異口同音一唱百和規摹之始逺近駢集凡輸財薦貨委積於庭下者不可選紀里閈貧民負木輦土或終夜不休又得門人鄉社股肱其事遂濟登茲始作之嵗月皆不得而知也復興於正隆庚辰之春訖功於大定丁亥之秋已而狀其成以告有司額之曰延祥觀昔豫為邑嘗與程為方外遊簿書少隙輒一過焉方是時棟宇欹傾屋煤蛛網不克以居視其後頽垣斷塹榛棘出入適足為彘囿蛇藪耳程指以語豫曰吾將闢此以官之雖然其成也不敢以獨有必求力行吾道能為人講解者坐南向師焉果如是干公其為我記之豫特戲曰姑勉旃吾毋難矣蓋口雖唯唯而心未之然也自爾逐食南北十有六年一日道人閻子固踵門求見問其人蓋升程之堂者也且泣且言嚮吾師所欲營辦者早以告成師今羽化矣適此之來也祁人相送於路皆願得公之文以列其事吾師死而不亡者此也幸毋忽豫迂儒文非所長重以故人之託言猶在耳義不得辭嗚呼程於其徒可謂賢也已初能鼓舞以得民財卒又濟之以不私功與行是可紀也東坡先生嘗謂論事易作事難作事易成事難夫論而作之作而成之程其殆庶乎豫為祁三年樂其土風信厚將去不忍聞祁之父老伐石久矣必欲得豫文以刻之是亦莫豫厭也豫今白首流浪方求田問舍期歸老於祁焉則是觀之風軒月圃皆為豫杖履所有其可不留語以為異時張本耶乃托其始末而併書之以告來者大定十九年嵗次己亥五月二十有五日起復朝請大夫通州刺史兼知軍事王元老記三友軒記大定嵗丙午冬仲月豫繇侍從出守汝南既視事之明年即州之北得敗屋數楹旁穿上漏不庇風雨乃命枝傾補罅仍其舊而新之公餘吏退以為燕息之所兩簷之外左有笋石屹然而筆卓右有仙榆蔚然而蓋偃每佳夕勝日豫幅巾杖屨徜徉乎其間至於倚蒼壁而送飛鴻藉清隂而遊夢蝶方其自得於言意之表也心如堅石形如稿木陶陶然不知何者為我何者為物其為樂可勝計耶豫自是與木石有忘年莫逆之歡因榜其軒曰三友客有過而問焉曰竊聞吾子杜門屏迹交親解𣪚其所友者誰歟豫指以告客仰而歎俯而笑曰曩吾以子為達今子之鄙至此乎所謂笋石者鱗皴枯燥不任斤鑿此固無用之石也所謂仙榆者離竒卷曲不中規矩是亦不材之木也人且賤而棄之曽不一顧子惡取而獨友於是哉豫曰嘻若知其一未知其二向有牛竒章之嘉石錢吳越之大樹則第以甲乙衣以錦繡矣豫雖欲友其可得乎今以豫謬人與夫頑石散木皆絶意於世而世亦無所事焉此其所以為友也夫人情之嗜好固不在乎尤物而在乎適意而已然必先得之於心而後寓之於物故無物不可為樂如謝康樂之山水陶彭澤之琴酒嵇康之鍛阮孚之屐雖其所寓不同亦各適其適也子意以為何如客曰是則然矣奈何木石無情奚足以知子之區區如此豫曰不然人之遇物但患不誠果能以誠則生公之石可使點頭老奘之松亦能回指幸無忽客愧豫言茫然自失宜其有會於心者乃相顧一笑而去豫因以是言而刻諸石實丁未夏四月望日三槐王元老記瑞葵堂記沃為河朔名郡而臨城其輔邑也臨城本房子之故地由兩漢晉唐以來通以子男之職治之自天寶改元而後始有今名按其圖古縣治去贊皇山西南六十里濟水所出東至廮陶入於泜故溪山勝槩人物繁阜視他邑不為下然頃年多盜晝夕有桴鼓之警部使者督責有司救過不暇黠胥悍卒因緣為姦以至逋租匿役民罔克堪故吏之當臨城者往往畏避如探湯然遼陽王君安中來尉是邑至則引見耆舊問弊所先僉曰吾鄉本無事嵗苦官兵以擒賊為名其實擾之王君天材精敏夙有志於行道乃相與謀諸同事曰蕞爾國夫有民人焉有社稷焉王事均也吾輩豈可坐視斯民為豺狼魚肉乎於是逐乾沒擊強梁凡細民為盜攀牽罣誤者悉澡雪而撫存之未幾暴客相率以去闔境恬然昔時田里愁痛之聲化為歌詠民氣以和越明年燕居之側丹葵數種異本而同枝狀如駢拇及其末也分而為雙花並秀如紅玉連理翌日黃童白叟聚觀歎息舉欣欣焉相告曰我公憂民遑遑如不飲食宜如此其報也已而夀酒於堂且揭其額而書之曰瑞葵客有自臨城來者目擊其事具以王君懇力請於豫曰是事固不足道然亦一假竒也管城子楮先生幸無恙謾為我記之豫應之曰是大不然昔唐咸寧王尹蒲之七年木連理生於河東昌黎先生頌其德宋晉陵邵叶宰新昌之三月芝五色生於便舍山谷道人紀其實彼草木何知猶能託循吏之功名藉巨公題品卒表見於後世豈臨城之葵不及河東之木與新昌之芝乎所恨不遇才名如退之魯直者不使王君之名與天壤俱矣夫天時人事之際其實甚明然必有可致而致之况神竒之産豈偶然哉豫意其造物者不特為惠政和氣之徴亦有以見傾心向日之義也或謂王君有濟時之具久沉下僚豈明月夜光無先容而不能前者耶抑窮通有數時不至而不可強者耶雖然以若所為決非翺翔蓬蒿者吾子其勉旃要當鴻漸於此而羽儀天朝矣乃兄建中問學仁義暴白於天下與豫莫逆於今餘三十年終始如一觀其兄可知其弟之為人故敢期以逺者大者嗚呼凡百有官君子蒞民從政不可以不誠孟子所謂至誠而不動者未之有也不誠而未有能動者如王君其可謂至誠也已此豫所以樂為之書以告來者庶幾咸有王君之志則邑民之福其可既乎
