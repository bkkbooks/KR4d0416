body:
  text: 拙軒集巻二金王寂撰五言律詩被檄平田訟投宿兎山院留題人事絶紛譊臨軒面四郊松風清不斷槐影宻相交花蘂香蜂穴芹泥落燕巢他年香火社此地擬誅茅中秋月下有感戯傚樂天此夜十分滿中秋萬古情素娥應不老蒼鬢可憐生追想懽呼處飜成歎息聲悲歡人自爾月是一般明送王平仲二首潦倒少矍鑠臞儒餘愚迂半面便健羡無渠吾胡娱袖手乆不偶鋪書如枯株索寞各作惡呼車姑須㬰放浪曩骯髒囊裝將長揚偃蹇晚倦獻徜徉藏光芒著雨苦齟齬蒼茫荒羊腸黯慘厭漸險彷徨傷王陽蔡州懸瓠城雄壯登臨寫客懐九州惟古豫千里控長淮極目棲林杪臨芳瞰水涯南城新息路西市確山街門易朝京榜亭餘閱世牌樂光眉拂黛溱汝股分釵八卦壇微認三王塜宻挨輞湖魚唯唯壺樹鳥喈喈顔筆龕塵壁裴碑瘞土堦卜蟾聞邁志係鱉近齊諧坡底為龍竹㕔前繫馬櫰絶纓臺泯没鑄劍冶堙埋坡迹留任宅涪詩刻秀崖黄陂澄宇量許月旦名排秦賦敵楊子婁歌勝李娃越王悲壯志唐女換遺骸元濟狂梟獍宗權暴虎豺土風敦儉素聲樂絶滛哇玉粒家家足紅薑處處皆吴氛薫霧瘴楚氣拂雲霾笋石當衙道仙榆拂郡齋王侯更廟狄富相捍潭柴竦也嘗臨判謙乎亦攝差陳翁孫接踵歐父子聫階觀額因王覿民坊出陸偕許詩多散落葉記半磨揩徃哲優師帥遺風軼等儕老夫為政拙雅志與時乖倦鳥收長翮疲駑戀短稭江山題不盡吾已辦青鞋挽姚仲純夫子人之傑魁然道最純鄉閭連沛邑族系出虞賔清節氷壺瑩孤標玉樹新妙齡探桂窟雅志傲蒲輪事業傳衣鉢風流表縉紳斗南惟此老月旦復誰人忍死哭亡社偷安笑具臣斯文雖未䘮吾道竟誰伸彭澤不書宋東陵無負秦直從强徤日收得自由身把臂言猶在回頭迹已陳發書占賈鵩絶筆感商麟去矣騎箕尾嗟哉厄巳辰終天從此别窮壤向誰親堕槨逢王果留燈待沈彬彭殤俱逝水丘跖共荒榛書帶縁新壠笛聲起舊隣絶絃雙堕淚挂劍一傷神冡樹悲長夜山花作好春龜趺平木杪誰為寫光塵六言律詩贈李彦猷郭伯達二首才氣無雙家世中朝第一名儔茂藹登龍士譽醉揮倚馬詞頭南鄭囊封倜儻西崑詩律深幽自古卜鄰識面與君正合交逰豪氣從來角出雄文未易肩儔學驥翻輸牛後㸃蠅誤失龍頭經火初驚玉美飲風乆識蘭幽他日相期林下幅巾與赤松遊七言律詩寄王周拙道人幾年風浪汨迷津一息煙霞遂隠淪結屋正宜居子午投巾聊復記庚申兒孫又繼平生志姑婦能甘抵死貧邂逅相逢應笑我蒼頭華髪走紅塵寄李致美别來嵗月遽如許鱗羽沉浮絶徃還欵接清譚思寓直未忘習氣夢催班信知天上玉堂好何似江西道院閑他日相逢能似舊祗應君眼與南山予叨諫員恨無補報矧年來歸計未成晝夕梗于胸中作詩以見意漏盡鐘鳴誰執咎望輕責重難為功老蠶無地可作繭驚鴈見月思傷弓言忠政恐祝三佞句好豈辭黄九窮吾非匏𤓰能不食朝莫喜怒從狙公受諫職夜乆不寐責重還憂力不任中宵未寢念之深姚虞已拱垂衣手山甫空勞補衮心仗馬不鳴羞短豆野麋有志老長林横身㑹有涓埃報莫笑年來便學喑至新蔡寓居開元寺暇日登經樓賦詩文伯起繼作以其寺壁舊有秦少游題詠故尾句及之淮海於此作學官計其年尚少當時坡谷鉅公皆推重意為逺到而竟不然所謂方行萬里出門車折軸者惜哉徃昔秦郎妙天下淹留嘗倚仲宣樓長材不用虎為䑕塌翼竟從蜩與鳩夭矯飛雲蛻仙骨連巻雌霓落墻頭世間玉人豈復有應與晁張地下遊初到蔡下已有春意向辭北闕猶飛雪及到南州便得春知有勝㳺供勝具况宜閑處着閑身江湖且作龜魚主天地能容蟣虱臣兀坐静思心語口此來無愧汝陽人鞏義卿逰學蔡下積年今雖老豪氣不除此州因兵火後鄉校幾廢義卿獨能徒步千里請所費于有司今復告成亦可謂能張吾軍者也泮宫俎豆幾息矣極力贊成時乃功詞源淊淊注絶壑俠氣凛凛凌層空鄉人敢易蘇季子坐客盡驚陳孟公相見明年春更好杏園人醉馬嘶風方山聞有代者坐中或至澘然五年不去任推擠慚愧鈆刀試割雞妻子乆甘塵滿甑兒童嘗笑醉如泥恨無遺愛寛齊市空有餘愚汙冉溪此去㑹應書下考於潜癡女勿輕啼思歸擢賈之髪罪莫數君恩猶許牧邉州夢尋薊北山深處身在淮西天盡頭袖手不應書咄咄乞骸端欲牓休休求田問舎真良䇿卧地還勝百尺樓夜宿淮陰城下將軍旗皷渡中流明旦孤城土一丘埋沒㳺魂隨野草煩寃新鬼哭沙洲坐看赤壁飛灰滅行想金陵王氣收惟有多情淮上月夜深還照女墻頭故人翟仲謀潦倒塲屋今復見之所異于昔者蒼頭白髪耳適以詩陳情輙次其韻因以勉之憶昔妙年仝射䇿今誰存者苦無多酆城乆矣埋長劍陶壁依然掛短梭鈆槧功夫真戯耳虀鹽活計柰貧何鵬圖九萬平生事老翮青雲尚可摩雞頭竹爐新煮軟氷丸咀嚼寜憂齒頰乾誰認鼈胎刳玉弹共驚蛟室泣珠盤芋頭有味終難永菱角齊名不柰寒喚起舊年風月興惜無千丈酒膓寛天德辛未家君守官白霫僕是嵗登上第交遊飲博皆一時豪俊于今二十六年矣適以審刑復來留數日故人髙晦之以舊見訪問當時所與㳺者徃徃鬼録髙本富家今貧甚僕向最年少今老矣感歎乆之為賦詩以自遣憶昔登科正妙年鞭笞龍鳯散神仙金釵貰酒春無價銀燭呼盧夜不眠徃事悲凉真夢耳故人零落獨澘然臨街父老應相識笑指潘郎雪滿顛日暮倚杖水邉水國西風小揺落撩人覉緒亂如絲大夫澤畔行吟處司馬江頭送别時爾輩何傷吾道在此心惟有彼蒼知蒼顔華髪今如許便掛衣冠已是遲别髙麗大使二首萬里朝天禮告成歸途氷滸積峥嶸相從遽作春雲散欵語何妨夜月傾兩地闗河傷逺别一天風雪歎勞生他年幣玉重來日對立罘罳眼更明送迓都忘百日勞怱怱言别柰無聊渡江相見迎桃葉分馬能忘贈栁條煙抹雞林山隠隠雲横鶴野路迢迢君侯此去應前席為贊忠嘉事聖朝李仲佐遼東之豪士也初識于大元帥席上怪其議論英發坐客盡傾至于通練世務商較人物雖博學老儒或有所不及僕喜其為人臨分以二詩贈行且將以為定交之劵也夤縁樽俎接雍容一洗從來蔕芥胷笑我殘年方射䑕喜君巨手學屠龍聞名素重千金諾識面尤輕萬戸封指日乘槎吾巳矣與君林下㑹相逢客路逢君葢少傾歡然相與話平生心胷皂白人倫鑒齒頰吹嘘月旦評雞黍後期雖有信參商輕别得無情從今把酒須東望千里闗山共月明過代金波曽醉鴈門州端有人間六月秋千古山河䧺朔部四時風月入南樓漢家戰伐雲千里唐里英䧺土一丘繋馬曲欄搔首望晚來閑殺釣漁舟題莊子祠堂䝉莊千古骨成塵德業猶争日月新說劍似乎非聖作鼓盆聊爾見天真螳蜋恟恟人間世蝴蝶悠悠夢裡身才與不才俱是累先生木鴈請書紳海棠輕紅淡白天然態山杏溪桃不足多睡足精神閑蠟燭酒酣肌肉捲香羅都官有隙遽如許工部無情奈爾何流落幸遭蘇玉局一樽相對為君歌病起衰疲那復病交攻湯劑扶持幸有功牀下蟻聲端是妄杯中蛇影本來空政縁造物偶相戯不謂工詩坐此窮三復佳章覺便健信知書檄愈頭風張子固奉命封冊長白山廻以詩送之勞生汨没海浮粟薄宦飄零風轉蓬我昔按囚之汶上君今持節出遼東分攜遽爾閱三嵗相對索然成兩翁徤羡歸鞍趂重九黄花手撚夀杯中寄題涿郡蜀先主廟當年竹馬戯兒曹笑指籬桑五丈髙時也共誅千里草天其未厭夘金刀宗臣嘔血重三顧嗣子不才輕六韜故國神游得無恨破垣風雨夜蕭騷天下英䧺惟使君本初之輩不須論初無尺土三分國遽隕長星五丈原簡䇿功名成廢紙嵗時簫鼓閙荒村猶勝故國不歸去呌斷西風杜宇魂題伍員廟蚤年亡命入蘇州破越興吴出坐籌可惜捧心貽後患遽令嘗膽雪前羞忠臣竟受鯨鯢禍故國空傷麋鹿遊欲向波神問遺恨胥山三月看潮頭送劉師韓歸雲中二首怱怱杯酒促行輈挽斷征衫不少留别友情懐雖作惡還家滋味勝封侯雞催淡月閭山曉鴈貼黄雲馬邑秋老矣仲宣歸未得微君底處許依劉客裏那堪送客行迢迢煙水指歸程子規催促渾無頼秋雨留連却有情此日短亭輕折栁何時長路重班荆着鞭穏上青雲去莫惜因風蚤寄聲丁未肆眚平生自信不謀伸媒孽那知巧亂真暗有鬼神應可鑒逺投魑魅若為隣九天漢詔與更始萬里湘纍得自新天地生成知莫報一杯何日與封人髙武略復和尖字韻見贈走筆奉酬落紙千篇筆退尖我方刻畫老無鹽鼎鐘之後知誰識糟麴其間想自嫌顧冀北羣須伯樂嗣西江派得洪炎便當覓取髙師着此去心顔更可澘泛舟用王子告節副韻二首綵舟風軟蹙波瀾草草杯盤略觧顔緑蟻淺斟金鑿落青娥低唱玉連環忘機鷗鳥心情好信美江山眼界寛老矣相逢拚一醉正須絲竹冩餘歡勲業時時把鏡看却嫌秋水照衰顔肘懸斗印慚分竹行恐泥封促賜環酒裏光陰真可惜客中懐抱若為寛十觴一舉君須醉念我區區亦鮮歡春牛土木形骸聊假合丹青毛角巧相宜老拳痛手交攻爾粉骨碎身知為誰不似驚狂持索處正如觳觫過堂時漆園傲吏真達者未肯生為太廟犧送李致美之任雲中宸衷簡在付陪京摩拊疲氓藉老成金闕共瞻卿月出野人相慶福星明先聲雷殷媯州路和氣春迴魏帝城想見郊迎笳鼓競吏民驚嘆綵衣榮探春二首和氣融融散薄原東風應已入東門坡云東風未肯入東門弄晴野鵲翻髙樹趂暖家雞啄破垣淺緑未生挑菜渚嫩黄先報探花村安排詩酒相追逐聊慰天涯倦客魂撥忙騎馬到郊原絶勝喧卑倚市門破凍薺芽敷畝隴向陽蔬甲觸藩垣春陰半暗雲間寺夕照偏明水外村悵望故園歸未得且呼歡伯暖氷魂題北禪寺用前韻紺宇峥嶸枕膴原相承祖印出雲門層簷蛛網圍沙界傑榜金書照粉垣香火勝縁通四衆華燈珍供走諸村神光潑眼旃檀像想見天魔落膽魂題佶大師松菊堂阿育浮圖古道場最宜花竹暗禪房影侵羅什翻經席香散生公說法堂飛節芝豐輕嵗月辟寒金瘦傲風霜他年逺社歸吾老為我須留漉酒囊送張希召二首憔悴談𤣥揚子雲如何耳冷百無聞從來不識河南守此去還空冀北羣逺别定須多作惡相逢無惜重論文勿卑小郡為無益餘潤京師正頼君省臺諸子例才兼盡道超羣未及髯自苦折腰供吏役誰憐白髪困郎潜塵靴乆厭踏紅軟氷簟常思負黒甜好向水雲鄉裏去監州不惡有團尖送張希召出宰贛榆耐乆誰如故國山送君直過穆陵關一川魚鳥江淮近千里農桑海岱間老驥未甘塵土厄仙鳬宜向水雲閑此行莫作三年别考最當隨紫詔還送劉子髙宰新安二首吾髯得邑古河南政事應須出笑談但喜時平由聖主不憂縣小選中男子文已慣三無愠叔夜休辭七不堪想見細民多受賜長官如水吏羞貪憐君桂玉苦羇棲强項逢人未肯低病裏更貧猶愛客酒中有得不謀妻長材無用虎為䑕妙手豈論牛與雞考課㑹應書上上促歸行看紫封泥䟦風栁忘牛圖溪風淅淅栁絲柔栁下蠻童釣晚洲老牯安行無寸草㳺鯈飽食弄沉鈎連羈治馬真成虐挾䇿尋羊未足優何似人牛俱不見短蓑髙掛樹枝頭三逸堂白芍葯春城白葯占春餘妙品端宜入畫圖萼粉雨餘沾蝶翅蘂香風暖上蜂鬚夀陽宫女粧梅額姑射仙人瑩雪膚不見眉山蘇閣老更誰能賦玉盤盂元夕有感一生能見幾元夕况是東西南北人殘夢闗河鼇禁月舊遊燈火馬行春嵗華投老送多感節物對愁争一新自笑區區成底事天涯流落淚沾巾次韻郭觧元病竹二首此君清苦少知音獨有幽人忍凍吟生死挺然終抱節榮枯偶爾本無心比肩恥與蒿萊伍强項不容氷雪侵姑待東風脫新緑傍陰髙卧觧吾簮風摧雨折不成陰培養應無老醉吟狂直未能忘故態孤清端不負初心佳人日暮何堪倚太守春饞輙莫侵特立閑門固癡絶看他桃李上華簮上南京留守完顔公二首聖朝敦睦重分封不學成王戯剪桐終以阿衡任天下暫留蕭相守關中窮邉緑野人煙接永日黄堂獄訟空巨手不應偏福地㑹歸調鼎贊元功赫赫金源帝子家暫分符竹奠京華禮容登降歌麟趾廟筭縱横制犬牙黄閤乆聞虚鼎席朱衣行引上堤沙他年定數中書考異姓汾陽不足誇平夷道中二首河陽白髪近來添行役勞勞嵗已淹仕路黄楊何日進宦情橄㰖幾時甜未妨徐邈時中聖自笑東坡不受痁箕斗虚名將底用慨然舒笑一掀髯歸思秋來日日添擬將餘恨寄江淹東華乆厭踏紅軟北牖常思負黒甜世路窮通端是夢人情寒熱動如痁兒曹縱有英䧺手第恐英䧺未及髯留題紫巖寺手胼足趼不知勞珍重麻衣道最髙跨岸飛橋横玉蝀倚空層閣壓金鼇一天花雨森秋氣萬壑松風捲夜濤怕見雲堂老尊宿笑人塵土滿征袍投宿青山院中夜不寐夢覺歸心正鬱陶青螢燈火擁綈袍短檠却對顔何厚長鋏髙彈氣轉豪入室寒螿鳴破壁隔窓飢馬齕空槽年來髀肉渾消盡一事無成有底勞席上贈馬楊陳三同道君辭綘帳尸糟麴公草𤣥經守薜蘿一坐盡驚真俊爾半生不語奈癡何清談緩舉玉如意痛飲屢翻金叵羅眼界幸無俗物惱釋然一笑散千痾遊山寺盤紆細路僅能通斷壑危橋渡幾重横嶺盡頭方見寺亂雲深䖏忽聞鐘黄昏古屋翻飛鼠緑净寒潭隠蟄龍慚愧居僧還好客鄰家乞粟備晨舂散䇿日涉家園三五回虚堂俯瞰碧溪隈酒杯有限愁難遣詩句無窮花旋開多是春分遲社到要教燕子趂時來風寒留雨迷楊栁翠色迎晴拂舊埃自東营來廣寜道出牽馬嶺嶺西去路幾半里松檜鬱然桃李間發問之云利器梁侯之先塋也其櫬尚附淺土遂命酒哭奠而去公初待我以國士雖晚意少疎而恩禮未易忘也九仞終虧一簣功想知銜憤泣幽宫死生怒臂屈伸頃得失奕碁翻覆中只有松杉全晚節不隨桃李嫁春風門生故吏知多少誰致生芻奠此翁再過墳下毁譽譊譊息葢棺百年春夢大槐安功名倒挽九牛尾富貴真成一䑕肝故國鸎花人事改空山風雨夜臺寒平生我亦心如鐵醉眼西州淚不乾易足齋吾愛吾廬事事幽此生隨分得優㳺窮冬夜話蒲團暖長夏朝眠竹簟秋一榻蠧書閑䖏看兩盂薄粥飽時休紅旗黄紙非吾事未羡元龍百尺樓路逢安陽花酒問之云迓貳車于河上戯以詩寄蕭彭老慣曽歌酒醉秦樓客路相逢為少留油壁繡簾紅粉面銀瓶絲絡紫泥頭眼寒老杜膓先斷肺渇長卿涎欲流遥想蕭郎髙㑹䖏淺斟低唱木蘭舟跋楊德懋雪谷早行圖氷凍雲凝萬木乾亂山重叠雪漫漫人藏龜手借餘暖馬縮蝟毛凌苦寒兒輩豈其專尚利此翁無奈未休官人生寄耳遽如許底處息肩聊解鞍分韻賦松風得泉字蒼髯疎影冷浮煙坐乆披襟更灑然蕭索半天催急雨清凉三峽泛流泉尋真客至花飛下憇寂僧閑子滿前却笑朱門無逺韻秪將俗耳醉繁絃再遊鐵佛寺致奠王庭光竹杖芒鞋過虎溪素琴濁酒記仝攜嗟君死日無千駟約我來時贈隻雞滿地餘花春寂寂半巖蒼檜雨凄凄悲凉人散黄昏後萬木號風野鳥啼碧濟泉清安寺突兀層峯刻削成嵌空金碧鬱峥嶸長松萬壑海潮上飛瀑半天山雨傾白石清泉良負爾紅塵烏帽可憐生僧窓不厭俗人汙暫息勞筋睡到明留題鼓山寺風落松聲撼晝眠似聞鍾磬響雲顛竹林欲訪知何地石鼓相傳不記年齊主有縁成勝事周兵無賴化飛煙何當一洗紅塵眼㑹見神通五萬仙
