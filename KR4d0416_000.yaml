body:
  text: 提要拙軒集六卷别集類四金臣等謹案拙軒集金王寂撰寂字元老薊州玉田人登天徳二年進士厯官中都路轉運使諡文肅金史不為立傳元好問中州集載其詩入乙集中而仕履亦僅見梗概今以寂詩文所著年月事蹟㕘互考證知寂自登第後於世宗大定二年為太原祁縣令十五年嘗奉使往白霫治獄十七年以父艱歸明年起復真定少尹兼河北西路兵馬副都總管遷通州刺史兼知軍事又遷中都副留守二十六年冬由户部郎出守蔡州二十九年被命提㸃遼東路刑獄章宗明昌初召還終於轉運使之職而集中謝帶笏表有世宗饗國臣叨與諫員語則又嘗為諫官又有羣言交搆擠臣不測之淵語而丁未肆眚詩有萬里湘纍得自新句丁未為大定二十七年世宗本紀載是年三月辛亥以皇太孫受冊肆赦並與集合是寂之刺蔡州當以人言去國而集中情事不具其顛末莫能詳也中州集稱寂著有拙軒集北遷錄諸書今北遷錄已失傳而好問所選寂詩僅七首及附見姚孝錫傳後一首其他亦久佚不見惟永樂大典内所載寂詩文尚多雖好問所摘留别郭熙民詩諸聫及蔣一葵長安客話所紀盧植墓詩逸句皆未見全篇亦不能盡免於脱闕而各體具存可以得其什七矣寂詩文清刻鑱露有戛戛獨造之風在大定明昌間卓然不愧為作者金代知名之士見於中州集者不下百數十家今惟趙秉文王若虚二集尚有傳本餘多湮没無存獨寂是編幸於沈埋晦蝕之餘復顯於世而文章體格亦足與滹南滏水相為抗行謹甄第裒綴釐為六卷俾讀者攬其崖畧猶得以考見金源文獻之遺是亦可為寳貴矣乾隆四十年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
