body:
  text: 拙軒集巻六金王寂撰序贈日者李子明序易有君子之道四焉而卜筮其一也古之避世者或多卜隠則司馬季主嚴君平其人矣初不以區區小數驚動世俗意欲使逆知禍福畏辠趨善而已今之日者行衢坐肆紛紛如蝟毛然而言信而有徵者亡㡬大抵市道以急衣食之計所以馳騁穿鑿牽合詭誕無所不至所謂君子之道者吾不得而見之矣遂人李子明得樂五虎之遺法又能以五行十干竒耦成字吉凶否泰必以忠吿嘗爲予筮之屢中諺云老醫少卜若方富於年但當於古人用心處以期益進則季主君平安知不復見於今日也予頃以使事往來保遂間渠從予乞言懇甚故以此遺之大定壬寅臘前一日拙軒主人王元老書送故吏張弼序大定改元之再歲予爲縣於太原之祁時邉烽未息千里轉輸予以朝命從事於四方邑吏弼者嘗與其行弼天資畏慎義不爲乾沒予繇是推置腹心初不以羣吏處之以至險阻艱難無不同者今予之去祁二十有四年中間音書訊問執敬如初及予自從官出蔡守弼又能不逺數千里跋渉畏塗踵門過我予驚聞其來倒衣以迎話舊通夕恍如夢寐葢留㡬月而後去臨行乞言意眷眷似不能已者予雖欲無言得乎夫吏之所習詭道也或桀黠尤甚者揣不言之意伺欲動之色推輕重矯枉直必利而後已爾奚獨反是得非好學聞義理使之然哉雖然求之此途亦未多得以始終之際殆不減眀逺所愧予名位不及古人不使爾名暴白於當世託以不朽姑於其行也序以爲贈云曲全子詩集序曲全子予之母弟也少頴悟天資孝友以予有十年之長兒時嘗受經於予故事予猶師也性坦率與人畧無崖岸當酒酣耳熱視世間富貴兒皆卧之百尺樓下然不喜塲屋之學人或勉之笑而荅曰吾兄已世其家吾親已享其祿吾事濟矣誰能踽踽從原夫輩覓官耶識者以爲逹平居季孟間把酒賦詩對床聴雨眷眷然不忍舍去當是時吾二親康健歲時上夀斑衣羅拜里人榮之指以爲慶門故牓其堂曰䨇橘一時名卿大夫士争相歌詠其事自爾荐罹憂患生寡食衆貧不能生兄弟狼狽餬口於四方渠亦僶俛赴調得監亳州酤意愈不樂自是日飲無何似與世相忘者未㡬疾作竟不起平生所爲詩無慮數百篇既沒之後而二子方啼笑梨栗豈知乃父之遺文當真賞深蔵以保於不朽哉已而旅櫬北歸予屢索於殘編斷藁中了不可得以是予與季弟每興言及此輙聲與涕俱出盖痛其不復見矣况九原之恨其能已乎大定己酉予被命提㸃遼東等路刑獄事閲再歲㑹以公集飯素於大清安禪寺偶於稠人中得故人李仲佐握臂道舊且復謂予曰元輔不幸今十年矣念一死一生之際未能忘情時令人誦曲全子集製如對晤語予驚聞其説懇請一見既而得之長篇短章凡四十有七惜乎所得之不多也雖然嘗一臠鼎味知矣奚以多為吾弟名寀字元輔曲全子蓋道號云眀昌改元之眀年春正月中澣日兄元老序帖啟與文伯起帖某啟伯起足下去歲竊食趙郡略當南北之衝蔡下舊人徃來如織時䝉惠教少慰縣縣某舊年嘗見中山王昭老稱頌伯起髙才博學恨未能識韶濩純音思欲趨前飽聴而不可得其傾想向慕為何如哉丙午冬某自地官出守蔡州終日兀然如坐井底閉門却掃謝絶交親分爲凍蟄枯枿無復有飛榮之望其况可知㑹足下自潁汝歸袖刺踵門修桑梓之敬某亦喜聞其來倒衣出迎都不省屐齒之折也已而握臂促膝説有談空至領㑹将無同處了不知賓主誰何顧此樂豈可與俗兒語耶某自改官餘人例皆旅退獨足下與鄭秀才相陪信宿翌日解携靳靳不忍訣去此情未易忘也所需重陽牡丹詩並真定有春庵記併録附呈可發千里一笑偶縁承乏出使遼鱗沈羽斷時閲足下詩文拊巻三嘆如對晤語汝南最得春先寒温未一尤宜以道自重適承告墨具審勿藥有期良多欣慰汝蔡相去千里而近力疾道路間可量艱苦腦疽作發大概服餌金石或祖父常嬰此疾傳之遺體自餘出於不意者又非常理可度當付儻來也某家蔵秘方自宋日名公士大夫累取大効近歲親舊凡患腦背瘡者亦嘗用之多得平復今如法修合謹封送大劑及録本方併希檢入書後書金剛經後先大夫歸德君夙植善根奉佛謹甚年二十七登第後日誦金剛經至春秋八十有三中間雖大寒暑風雨不廢也易簀之際澡浴振衣置經於首合手加額跏趺以終香聞滿室信宿乃滅人以為戒定之報某追念考妣去世乆矣無以伸㒺極之痛乃啟誠心手書金銀字金剛經受持讀誦以餘散施諸善知識歡喜奉行成就第一希有之法庻可感通佛祖升濟幽眀一切有情同霑勝利先有發願疏文亦恐乆之湮滅今併附於巻末云眀昌改元之眀年十月旦日拙軒主人王某敬題伏以磨骨髓遶湏彌頂猶難報四重恩捨身命等恒河沙未如生一念信輙伸宏願仰叩真乗書金剛般若波羅蜜經行菩薩利益不住相布施即将功徳追薦先靈徃生兠率陁天授記然燈佛所在在處處起不驚不怖不畏心世世生生獲無量無數無邉福欽惟大覺證眀謹疏題楊少師侍御帖後楊少師勸其父不以社稷與人此與魯公拒安禄山斥李希烈何異故其書雖承唐末五季餘習猶有承平純正氣象此侍御帖乃有魯公坐位帖筆法論書當論其人工拙不足論也况其工如是耶題三仙帖後潁濵書如仲長子光懐道遁世光而不耀東坡書如魏鄭公之遺直嫵媚可愛山谷書如莊周談大方不可端倪總而論之如華嶽三峯蓮峯中峙二峯旁迤秀色無可減也使當時愛之如今日又安有汝南之謫耶祭文祭城隍文維年月日具位某謹以香酒茶果之奠致祭於城隍之神維神受命於天分職兹土限幽眀之雖異課殿最以實同今日祗奉絲綸繕修城郭敢期隂相迄用有成豈惟吏責之可逃要使廟食之無愧尚饗行状先君行状先君諱礎字鎮之姓王氏大名莘人也其先出於周靈王太子晉之後由先君而上六世祖諱晝宋魏國文正公旦之從弟也初文正之父晉公歴顯漢周逮建隆開寳間卒以直道不容不登大用嘗手植三槐於庭曰吾後世子孫必有為公者至文正信然故世號其門曰三槐王氏晝為人勇果善騎射咸平初以靈夏之役累功遷供備庫使景德中命率所領戍雄州以禦契丹是時鳴鏑滿郊每戰輙勝一日輕兵追北夜隂霾迷所向誤堕溺津為遼人邏得之覉縻於景州南部落子孫因家焉曽大父文進輕財樂施世稱長者大父昇尚書比部貟外郎父臣忠崇禄寺丞成州録事參軍卒贈朝列大夫先君年二十七舉進士第釋褐補𢎞文舘校書郎奉聖州市判再調忻州秀容縣丞時天㑹五年王師南伐調發民兵本部以先君主之進攻唐鄧城陷軍中盡俘壮健而殺老弱先君獨取其老弱者數百朝與之食夜即縱去眀年凱旋時州境有劇盗髙麻胡恃險與衆鴟張莫制先君伺間夜銜枚破壘掩殺渠魁遲眀俘馘殆盡郡以状聞就遷太子洗馬知縣事俄以成州居䘮去職服除攝洺州鷄澤令㑹遼東更置郡縣守令皆取當時治有聲迹者先君擢海州析木令既至則不以窮鄉僻陋鄙夷其民而百事裁以繩墨數月告治舊俗多畜蠱毒殺人以祈富先君為出祕方轉相傳付所活不可勝計歲滿移知真定府平山縣縣有奚兵主将蕭嘉哩合私醸酒椎牛間遣奴輩白晝漁奪於市前為邑者熟視強梗者莫敢治先君盡發其姦贓捕奴之用事者案服抵罪自是脅肩累足訖去不敢犯已而赴行臺吏部當王植王効輩分職銓衡一見先君喜甚曰田吏部知公亷士乆欲改官當從此着鞭矣先君辭以疾授定州唐縣令先君退謂所知曰田侯疾惡太甚怨隙已成其能免乎未㡬果起大獄唐爲山中望縣然學校之廢已乆先君慨然歎曰養士之源發於鄉黨今吾邑曠數十年訖無一人得雋於塲屋是豈風厲之不至耶廼大新廟學延集諸生親為指授檢責其日課自爾獻賦䇿名者相繼先是鄰封有狂道士姓慕者妄慿神語隂搆異圖既而事敗先君承府檄大索支黨乃獨捕其始事十數人餘置而不問或有持社案名氏以告者先君曰是事了無干涉亟命火去父老至今懷德肖像以祠其後歴中西南京平陽京兆轉運判官徃任西京歲平薊大饑逐食之民疾疫死亡相藉於路先君謀及僚属為割廩餘日具饘粥以食餓人既而豪宗大姓争出粟相助頼以全活者十七八先君雅倦遊方抗章求去適㑹命下遷歸徳府判官時府帥怙權專恣遇官曺暴甚嘗課諸縣伐冰厚取其直以資公帑先君曰二千石為天子牧民者也奈何掠民膚髓為觴豆之奉乎力争乃罷初自長吏而下皆不悦及旁郡有坐是而黜者始謂先君曰㣲公㡬殆繇是信服事多咨决先君曰吾年如此豈能終埋沒於簿領哉翌日請老以歸先君天資渾厚胸次洞然與人無秋毫隠自其壮歲聲聞藹然謂青雲立可致無何跋㚄反堕冗調中顧尋常出其下者踵相躡臺省矣人以爲必不能平先君䖏之怡然自得性嗜書巻未嘗去手有詩百篇平淡簡古如其為人中年以來世味嚼蠟因自號退翁喜竺乾學從香林比丘悟柔傳出世法歲晚飯蔬衣褐翛然如僧過故山泉石佳處杖屨終日徜徉乎其間如是者十有四年一夕奄遘㣲疾閲數日晨起如平時沐浴易服跏趺而逝屬纊之後香聞滿室信宿乃歇人皆異之夀八十二實大定丁酉四月初一日也先君仕四十三年積官至通奉大夫夫人清河張氏汾州西河主簿孝端之女夫人有賢行為中外姻族表儀累封太原郡夫人後先君五年卒男三人曰寂中憲大夫中都副留守兼本路兵馬副都總管曰寀修武校尉早世曰缺進義副尉同監睢州酒孫男七人曰欽哉直哉良哉鄰哉庸哉文哉熈哉女孫五曰昭余適左國公孫茂曰瑶珍瓊珍弄珍勝珍並幼曽孫一曰誥孫不肖孤寂等期以某月日奉先大夫先夫人䘮𦵏薊州遵化縣仁夀鄉靈應山之東原從治命也今謹録其遺事大概以俟立言君子圖不朽焉謹狀又先君墓銘曰維盤之東全燕古風淑氣充塞挺生我公厥初受氏周靈王子三槐之大自文正始公亷且眀所莅有聲減牘破蠱死者復生不肯俛首寧居牛後惜哉陸沈誰援以手有官建莭不爲之衰身體強健年及期頥乗除得失天意可知棺衾既具銘旌啟路歛服以常治命有素納石於壙孝心永慕夜何晨兮閉佳城春復秋兮風宰樹鉅金之大老兮王公之墓墓誌銘清河張氏夫人墓誌銘夫人諱某字季玉姓張氏易人也其曾祖之上數世皆以貲産長雄於鄉里然髙氣義務施舍人以此多之大王父諱孝端主汾州西河簿王考价宋宣和間補祕書省祕書郎景州户曺掾本朝改奉信校尉隠居以終夫人年十四歸於今中都副留守王寂夫人性敏而静恭執婦道閨門肅然言動有法實生二男曰欽哉業進士曰直哉供奉班祗候女昭余適左國公孫茂年三十有五以大定六年十月十八日卒後五年進封太原縣君大定二十二年七月十七日𦵏於遵化縣靈應山之東原從舅姑兆銘曰夫人之祖長雄且豪尚義好施人以此髙夫人之性惠敏而静閨門之間日嚴與敬夫人之夀方七十半天乎天乎孰謂福善婦德既完婦道可觀從舅姑兆䰟其永安哀詞姚君哀詞昔吾先君所與交逰皆當世名士寂時尚幼每聞談姚君之美殆不容口正隆改元之眀年寂始識君欵接緒餘過所聞逺矣公諱孝錫字仲純安豐人也宋宣和甲辰舉進士第調代州兵曺弹冠振衣方有志於行道居亡何雁門失守主将以城降當時官屬晝夕股栗謀所以生公投牀大鼾絶不以經意人或問之公曰死生天也夫何懼之有士大夫以此多之皇朝奄有起公為五臺主簿未㡬移疾葢不復有意於世矣林泉佳處杖屨時一徜徉乎其間如是者五十七年大定辛丑八月日以疾終春秋八十有三先是歲饑物價翔踴長鬚輩収貸粟以規其利公怒而責之曰汝輩無狀苟家有餓殍雖有粟吾得而食諸亟命散去繇是益稱長者公天資簡淡平居專以書史自娛雖處暗室無秋毫之欺以至死生禍福不汨於胸中况顧冨貴為何等物也平生知我無如公者公之云亡寂適從事於四方繼丁家難不得置生芻於門下負媿多矣嗚呼九原㝠寞念無以致其哀者作此詞以哭之其詞曰公之父祖珥漢貂兮公之兄弟揭世標兮丁年射䇿追董晁兮走官窮塞政有條兮宣和失馭九鼎揺兮厥民塗炭生不聊兮守臣納土皆願朝兮公獨完莭儆乃僚兮中天特立斡斗杓兮致之不可况折腰兮退安丘壑躬牧樵兮西子掃除嫫母妖兮龍媒連蹇駑馬驕兮英聲義氣江漢潮兮文章德業日月昭兮初聞謦欬如九韶兮坐覺形穢鄙吝消兮醉軒下榻晝爾宵兮峰山執别歲月遼兮宦遊南北木偶漂兮期君夀考松不凋兮無何集舍鵩似鴞兮少㣲中夜掩紫霄兮百年如夢鹿覆蕉兮六十小刼風雨飄兮滕公載義駐使軺兮黄幡褁櫬恨未消兮與公平生言乆要兮並游地下亷藺超兮佳城一閉無復朝兮人琴俱亡誰與調兮山空月冷夜寥寥兮鳥啼花落春蕭蕭兮隻雞斗酒敢忘喬兮臨風揮涕川路遥兮䰟其如在尚可招兮
